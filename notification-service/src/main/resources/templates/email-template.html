<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${title}">Notification</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; line-height: 1.6; color: #333; max-width: 600px; margin: 0 auto; padding: 20px; }
        .header { background-color: #4CAF50; color: white; padding: 10px; text-align: center; border-radius: 5px 5px 0 0; }
        .content { padding: 20px; border: 1px solid #ddd; border-top: none; border-radius: 0 0 5px 5px; }
        .footer { margin-top: 20px; font-size: 0.8em; color: #777; text-align: center; }
        .button { display: inline-block; padding: 10px 20px; background-color: #4CAF50; color: white; text-decoration: none; border-radius: 3px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="header">
        <h1 th:text="${title}">ShopSphere</h1>
    </div>
    <div class="content">
        <p th:text="${message}">Hello!</p>
        <div th:if="${actionUrl}" style="text-align: center; margin: 30px 0;">
            <a th:href="${actionUrl}" class="button" th:text="${actionText}">Click Here</a>
        </div>
        <p th:if="${actionUrl}">If you can't click the button, copy and paste this link: <span th:text="${actionUrl}"></span></p>
    </div>
    <div class="footer">
        <p>&copy; 2026 ShopSphere Grocery. All rights reserved.</p>
    </div>
</body>
</html>
