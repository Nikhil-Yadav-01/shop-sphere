<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Your Verification Code</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; line-height: 1.6; color: #333; max-width: 600px; margin: 0 auto; padding: 20px; }
        .header { background-color: #2196F3; color: white; padding: 10px; text-align: center; border-radius: 5px 5px 0 0; }
        .content { padding: 20px; border: 1px solid #ddd; border-top: none; border-radius: 0 0 5px 5px; }
        .otp { font-size: 2em; font-weight: bold; color: #2196F3; text-align: center; margin: 20px 0; letter-spacing: 5px; }
        .footer { margin-top: 20px; font-size: 0.8em; color: #777; text-align: center; }
    </style>
</head>
<body>
    <div class="header">
        <h1>Verify Your Account</h1>
    </div>
    <div class="content">
        <p>Hi <span th:text="${name}">User</span>,</p>
        <p>Your verification code for ShopSphere Grocery is:</p>
        <div class="otp" th:text="${otp}">123456</div>
        <p>This code will expire in 10 minutes. Please do not share this code with anyone.</p>
        <p>If you didn't request this code, you can safely ignore this email.</p>
    </div>
    <div class="footer">
        <p>&copy; 2026 ShopSphere Grocery. All rights reserved.</p>
    </div>
</body>
</html>
