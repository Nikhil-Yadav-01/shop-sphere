# docker-compose.ci.yml
# ─────────────────────────────────────────────────────────────────────────────
# Override file for GitHub Actions CI (used with -f docker-compose.ci.yml).
# CI slice: auth-db + redis + kafka + mailhog + discovery-service + auth-service + api-gateway
#
# Key changes vs docker-compose.yml:
#   • Adds Redis, Kafka, MailHog (auth-service hard startup deps not in main compose).
#   • JWT_SECRET from env var with hardcoded fallback.
#   • APP_VERIFICATION_AUTO_VERIFY=false → full email-verification flow.
#   • MailHog used as fake SMTP — no real credentials needed.
#   • Port conflicts resolved for full-stack safety.
#   • Resource limits for GitHub runner (2 vCPU, 7 GB RAM).
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── CI-only: Redis (token revocation store) ──────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379"
    networks:
      - shopsphere-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    deploy:
      resources:
        limits:
          cpus: '0.20'
          memory: 128M

  # ── CI-only: Kafka (KRaft mode, user-event publisher) ────────────────────────
  kafka:
    image: apache/kafka:latest
    container_name: kafka
    environment:
      KAFKA_NODE_ID: 0
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 0@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://:9094
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,EXTERNAL://localhost:9094
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,EXTERNAL:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_NUM_PARTITIONS: 1
    ports:
      - "9092:9092"
      - "9093:9093"
      - "9094:9094"
    networks:
      - shopsphere-network
    healthcheck:
      test:
        - CMD-SHELL
        - /opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 || exit 1
      interval: 10s
      timeout: 10s
      retries: 15
      start_period: 45s
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 512M

  # ── CI-only: MailHog (fake SMTP — captures emails, no credentials needed) ────
  mailhog:
    image: mailhog/mailhog:latest
    container_name: mailhog
    ports:
      - "1025:1025"   # SMTP
      - "8025:8025"   # Web UI (useful to inspect emails during debug)
    networks:
      - shopsphere-network
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "1025"]
      interval: 5s
      timeout: 3s
      retries: 10
    deploy:
      resources:
        limits:
          cpus: '0.10'
          memory: 64M

  # ── Databases ────────────────────────────────────────────────────────────────
  auth-db:
    deploy:
      resources:
        limits:
          cpus: '0.30'
          memory: 256M

  # ── Discovery (Eureka) ───────────────────────────────────────────────────────
  discovery-service:
    deploy:
      resources:
        limits:
          cpus: '0.40'
          memory: 512M

  # ── Auth Service ─────────────────────────────────────────────────────────────
  auth-service:
    environment:
      # JWT
      JWT_SECRET: ${JWT_SECRET:-mySecretKeyForJWTTokenGenerationMustBeAtLeast256BitsLong}
      # Email verification: full production-like flow (token required to login)
      APP_VERIFICATION_AUTO_VERIFY: "false"
      APP_VERIFICATION_TOKEN_EXPIRY_MINUTES: "30"
      # Redis (CI container)
      REDIS_HOST: redis
      REDIS_PORT: 6379
      # Kafka (CI container)
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      # Mail → MailHog fake SMTP (no credentials needed)
      MAIL_HOST: mailhog
      MAIL_PORT: 1025
      MAIL_USERNAME: ""
      MAIL_PASSWORD: ""
    depends_on:
      auth-db:
        condition: service_healthy
      discovery-service:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_started   # Kafka producer is lazy — no eager connection at startup
      mailhog:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 640M

  # ── API Gateway ──────────────────────────────────────────────────────────────
  api-gateway:
    environment:
      JWT_SECRET: ${JWT_SECRET:-mySecretKeyForJWTTokenGenerationMustBeAtLeast256BitsLong}
    # Override depends_on to exclude admin-service from the minimal CI slice.
    depends_on:
      discovery-service:
        condition: service_healthy
      auth-service:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 512M

  # ─────────────────────────────────────────────────────────────────────────────
  # Port-conflict fixes (safe to include even when not starting these services).
  # ─────────────────────────────────────────────────────────────────────────────

  # checkout-db: was 5435 → 5436 (conflicts with media-db)
  checkout-db:
    ports:
      - "5436:5432"

  # batch-service: was 8091 → 8100 (conflicts with media-service)
  batch-service:
    ports:
      - "8100:8091"

  # review-service: was 8089 → 8096 (conflicts with admin-service)
  review-service:
    ports:
      - "8096:8089"

  # recommendation-service: was 8089 → 8099 (conflicts with admin-service)
  recommendation-service:
    ports:
      - "8099:8089"
