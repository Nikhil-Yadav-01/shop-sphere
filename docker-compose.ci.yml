# docker-compose.ci.yml
# ─────────────────────────────────────────────────────────────────────────────
# Override file for GitHub Actions CI — production-identical configuration.
# CI slice: auth-db + redis + kafka + discovery-service + auth-service + api-gateway
#
# Uses real Gmail SMTP (via GitHub Secrets MAIL_USERNAME / MAIL_PASSWORD).
# Verification tokens are extracted from docker logs for automated testing.
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── CI-only: Redis (token revocation store) ──────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379"
    networks:
      - shopsphere-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    deploy:
      resources:
        limits:
          cpus: '0.20'
          memory: 128M

  # ── CI-only: Kafka (KRaft mode, user-event publisher) ────────────────────────
  kafka:
    image: apache/kafka:latest
    container_name: kafka
    environment:
      KAFKA_NODE_ID: 0
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 0@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://:9094
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,EXTERNAL://localhost:9094
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,EXTERNAL:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_NUM_PARTITIONS: 1
    ports:
      - "9092:9092"
      - "9093:9093"
      - "9094:9094"
    networks:
      - shopsphere-network
    healthcheck:
      test:
        - CMD-SHELL
        - /opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 || exit 1
      interval: 10s
      timeout: 10s
      retries: 15
      start_period: 45s
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 512M

  # ── Databases ────────────────────────────────────────────────────────────────
  auth-db:
    deploy:
      resources:
        limits:
          cpus: '0.30'
          memory: 256M

  notification-db:
    deploy:
      resources:
        limits:
          cpus: '0.30'
          memory: 256M

  # ── Discovery (Eureka) ───────────────────────────────────────────────────────
  discovery-service:
    # No host port in CI — only the gateway is the public entry point
    ports: []
    deploy:
      resources:
        limits:
          cpus: '0.40'
          memory: 512M

  # ── Auth Service ─────────────────────────────────────────────────────────────
  auth-service:
    # No host port in CI — all traffic must go through the API gateway (:8080)
    ports: []
    environment:
      # JWT
      JWT_SECRET: ${JWT_SECRET}
      # OAuth
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      # Email verification: full production flow (token required before login)
      APP_VERIFICATION_AUTO_VERIFY: "false"
      APP_VERIFICATION_TOKEN_EXPIRY_MINUTES: "30"
      # Redis (CI container)
      REDIS_HOST: redis
      REDIS_PORT: 6379
      # Kafka (CI container — lazy producer, service_started is enough)
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      # Frontend Base URL (for email links)
      APP_BASE_URL: ${APP_BASE_URL:-http://localhost:8080}
      # Disable KafkaHealthIndicator only — Kafka uses service_started so broker
      # may not be ready when actuator/health is first polled.
      MANAGEMENT_HEALTH_KAFKA_ENABLED: "false"
      # Show full health details so CI logs are self-diagnosing on failure
      MANAGEMENT_ENDPOINT_HEALTH_SHOW_DETAILS: "always"
    depends_on:
      auth-db:
        condition: service_healthy
      discovery-service:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_started   # Spring Kafka producer connects lazily
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 640M

  # ── API Gateway ──────────────────────────────────────────────────────────────
  api-gateway:
    environment:
      JWT_SECRET: ${JWT_SECRET}
      # Redis for RequestRateLimiter (global default filter in application.yml)
      REDIS_HOST: redis
      REDIS_PORT: 6379
      # Disable Redis health indicator — rate limiter connects lazily
      MANAGEMENT_HEALTH_REDIS_ENABLED: "false"
    # Override depends_on to exclude admin-service from the minimal CI slice.
    depends_on:
      discovery-service:
        condition: service_healthy
      auth-service:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 512M

  # ── Notification Service ─────────────────────────────────────────────────────
  notification-service:
    ports: []
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      # Gmail SMTP
      MAIL_HOST: smtp.gmail.com
      MAIL_PORT: 587
      MAIL_USERNAME: ${MAIL_USERNAME}
      MAIL_PASSWORD: ${MAIL_PASSWORD}
    depends_on:
      notification-db:
        condition: service_healthy
      discovery-service:
        condition: service_healthy
      kafka:
        condition: service_started
    deploy:
      resources:
        limits:
          cpus: '0.30'
          memory: 384M

  # ── Catalog Service ─────────────────────────────────────────────────────────
  catalog-db:
    image: mongo:7.0
    container_name: catalog-db
    ports: []
    networks:
      - shopsphere-network
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 512M

  catalog-service:
    ports: []
    environment:
      MONGO_URI: mongodb://catalog-db:27017/shopsphere_catalog
      EUREKA_URI: http://discovery-service:8761/eureka
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      REDIS_HOST: redis
      REDIS_PORT: 6379
      MANAGEMENT_HEALTH_KAFKA_ENABLED: "false"
      MANAGEMENT_HEALTH_REDIS_ENABLED: "false"
      MANAGEMENT_ENDPOINT_HEALTH_SHOW_DETAILS: "always"
    depends_on:
      catalog-db:
        condition: service_healthy
      discovery-service:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_started
    networks:
      - shopsphere-network
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 768M

  # ── Inventory Service ───────────────────────────────────────────────────────
  inventory-db:
    image: postgres:15-alpine
    container_name: inventory-db
    environment:
      POSTGRES_DB: shopsphere_inventory
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports: []
    networks:
      - shopsphere-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '0.30'
          memory: 256M

  inventory-service:
    ports: []
    environment:
      DB_HOST: inventory-db
      DB_PORT: 5432
      DB_NAME: shopsphere_inventory
      DB_USERNAME: postgres
      DB_PASSWORD: password
      EUREKA_URI: http://discovery-service:8761/eureka
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      REDIS_HOST: redis
      REDIS_PORT: 6379
      MANAGEMENT_HEALTH_KAFKA_ENABLED: "false"
      MANAGEMENT_HEALTH_REDIS_ENABLED: "false"
      MANAGEMENT_ENDPOINT_HEALTH_SHOW_DETAILS: "always"
    depends_on:
      inventory-db:
        condition: service_healthy
      discovery-service:
        condition: service_healthy
      kafka:
        condition: service_started
      redis:
        condition: service_healthy
    networks:
      - shopsphere-network
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 768M

  # ── Cart Service ────────────────────────────────────────────────────────────
  cart-service:
    ports: []
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      EUREKA_URI: http://discovery-service:8761/eureka
      MANAGEMENT_ENDPOINT_HEALTH_SHOW_DETAILS: "always"
    depends_on:
      redis:
        condition: service_healthy
      discovery-service:
        condition: service_healthy
      catalog-service:
        condition: service_healthy
      inventory-service:
        condition: service_healthy
    networks:
      - shopsphere-network
    deploy:
      resources:
        limits:
          cpus: '0.40'
          memory: 512M

  # ─────────────────────────────────────────────────────────────────────────────
  # Port-conflict fixes (safe to include even when not starting these services).
  # ─────────────────────────────────────────────────────────────────────────────

  # checkout-db: was 5435 → 5436 (conflicts with media-db)
  checkout-db:
    ports:
      - "5436:5432"

  # batch-service: was 8091 → 8100 (conflicts with media-service)
  batch-service:
    ports:
      - "8100:8091"

  # review-service: was 8089 → 8096 (conflicts with admin-service)
  review-service:
    ports:
      - "8096:8089"

  # recommendation-service: was 8089 → 8099 (conflicts with admin-service)
  recommendation-service:
    ports:
      - "8099:8089"
