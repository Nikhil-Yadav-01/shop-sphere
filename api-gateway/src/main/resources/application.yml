server:
  port: 8080
  shutdown: graceful

spring:
  application:
    name: api-gateway
  lifecycle:
    timeout-per-shutdown-phase: 30s
  cloud:
    gateway:
      discovery:
        locator:
          enabled: false
      globalcors:
        cors-configurations:
          '[/**]':
            allowed-origin-patterns: ${GATEWAY_CORS_ORIGINS:*}
            allowed-methods: GET,POST,PUT,DELETE,PATCH,OPTIONS
            allowed-headers: Authorization,Content-Type,X-Requested-With,Accept
            exposed-headers: X-User-Id,X-User-Roles
            allow-credentials: true
            max-age: 3600
      default-filters:
        - name: RequestRateLimiter
          args:
            rate-limiter: "#{@defaultRateLimiter}"
            key-resolver: "#{@principalNameKeyResolver}"
            status-code: TOO_MANY_REQUESTS
            set-status-when-rate-limited: true
      httpclient:
        connect-timeout: 5000
        response-timeout: 10s
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: 2000ms
  cache:
    type: caffeine
    caffeine:
      spec: maximumSize=1000,expireAfterWrite=60s

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URI:http://localhost:8761/eureka}
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true

auth:
  service:
    url: ${AUTH_SERVICE_URL:lb://auth-service}

jwt:
  secret: ${JWT_SECRET}

management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway,routes
  endpoint:
    gateway:
      enabled: true
  tracing:
    sampling:
      probability: 1.0

logging:
  level:
    org.springframework.cloud.gateway: INFO
    reactor.netty.http.client: INFO
