name: CI – Gateway & Auth Slice

on:
  push:
    branches: [ main, master, develop, ci ]
  pull_request:
    branches: [ main, master, develop ]
  workflow_dispatch:

env:
  COMPOSE_PROJECT_NAME: shopsphere-ci
  COMPOSE_FILE: docker-compose.yml:docker-compose.ci.yml
  JWT_SECRET: mySecretKeyForJWTTokenGenerationMustBeAtLeast256BitsLong
  # Gmail SMTP — real credentials, identical to production
  # Set MAIL_USERNAME and MAIL_PASSWORD in GitHub → Settings → Secrets → Actions
  MAIL_USERNAME: ${{ secrets.MAIL_USERNAME }}
  MAIL_PASSWORD: ${{ secrets.MAIL_PASSWORD }}
  GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
  GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}

jobs:
  build-and-test:
    name: Build → Start Stack → Test
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      # ──────────────────────────────────────────────────────────────
      # 1. Source
      # ──────────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ──────────────────────────────────────────────────────────────
      # 2. Java + Maven cache
      # ──────────────────────────────────────────────────────────────
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      # ──────────────────────────────────────────────────────────────
      # 3. Build JARs for services that use pre-built JARs in Docker
      #    (auth-service, discovery-service pattern: COPY target/*.jar)
      # ──────────────────────────────────────────────────────────────
      - name: Build auth-service JAR
        run: mvn -f auth-service/pom.xml clean package -DskipTests -B -q

      - name: Build discovery-service JAR
        run: mvn -f discovery-service/pom.xml clean package -DskipTests -B -q

      - name: Build notification-service JAR
        run: mvn -f notification-service/pom.xml clean package -DskipTests -B -q

      - name: Build catalog-service JAR
        run: mvn -f catalog-service/pom.xml clean package -DskipTests -B -q

      - name: Build inventory-service JAR
        run: mvn -f inventory-service/pom.xml clean package -DskipTests -B -q

      - name: Build cart-service JAR
        run: mvn -f cart-service/pom.xml clean package -DskipTests -B -q

      # api-gateway builds inside Docker (multi-stage Dockerfile) – no host build needed

      # ──────────────────────────────────────────────────────────────
      # 4. Build Docker images
      # ──────────────────────────────────────────────────────────────
      - name: Build Docker images (CI subset)
        run: |
          docker compose \
            -f docker-compose.yml \
            -f docker-compose.ci.yml \
            build \
              --no-cache \
              --parallel \
              discovery-service auth-service notification-service catalog-service inventory-service cart-service api-gateway nginx-proxy

      # ──────────────────────────────────────────────────────────────
      # 5. Start the CI subset stack
      # ──────────────────────────────────────────────────────────────
      - name: Start CI stack (all required services)
        run: |
          docker compose \
            -f docker-compose.yml \
            -f docker-compose.ci.yml \
            up -d \
              --no-deps \
              auth-db notification-db catalog-db inventory-db redis kafka \
              discovery-service auth-service notification-service catalog-service inventory-service cart-service api-gateway nginx-proxy

      # ──────────────────────────────────────────────────────────────
      # 6. Wait for all required services to be healthy
      # ──────────────────────────────────────────────────────────────
      - name: Wait – auth-db (postgres)
        run: |
          echo "Waiting for auth-db..."
          for i in $(seq 1 30); do
            if docker exec auth-db pg_isready -U postgres -q 2>/dev/null; then
              echo "auth-db is ready after $((i*5))s"
              break
            fi
            if [ $i -eq 30 ]; then echo "auth-db timed out"; exit 1; fi
            sleep 5
          done

      - name: Wait – notification-db (postgres)
        run: |
          echo "Waiting for notification-db..."
          for i in $(seq 1 30); do
            if docker exec notification-db pg_isready -U postgres -q 2>/dev/null; then
              echo "notification-db is ready after $((i*5))s"
              break
            fi
            if [ $i -eq 30 ]; then echo "notification-db timed out"; exit 1; fi
            sleep 5
          done

      - name: Wait – inventory-db (postgres)
        run: |
          echo "Waiting for inventory-db..."
          for i in $(seq 1 30); do
            if docker exec inventory-db pg_isready -U postgres -q 2>/dev/null; then
              echo "inventory-db is ready after $((i*5))s"
              break
            fi
            if [ $i -eq 30 ]; then echo "inventory-db timed out"; exit 1; fi
            sleep 5
          done

      - name: Wait – catalog-db (mongodb)
        run: |
          echo "Waiting for catalog-db..."
          for i in $(seq 1 30); do
            if docker exec catalog-db mongosh --eval "db.adminCommand('ping')" -q > /dev/null 2>&1; then
              echo "catalog-db is ready after $((i*5))s"
              break
            fi
            if [ $i -eq 30 ]; then echo "catalog-db timed out"; exit 1; fi
            sleep 5
          done

      - name: Wait – redis
        run: |
          echo "Waiting for redis..."
          for i in $(seq 1 20); do
            if docker exec redis redis-cli ping 2>/dev/null | grep -q PONG; then
              echo "redis ready after $((i*3))s"
              break
            fi
            if [ $i -eq 20 ]; then echo "redis timed out"; exit 1; fi
            sleep 3
          done

      - name: Wait – kafka
        run: |
          echo "Waiting for kafka..."
          for i in $(seq 1 60); do
            if docker exec kafka /opt/kafka/bin/kafka-broker-api-versions.sh \
                 --bootstrap-server localhost:9092 > /dev/null 2>&1; then
              echo "kafka ready after $((i*5))s"
              break
            fi
            if [ $i -eq 60 ]; then echo "kafka timed out after 5 min"; exit 1; fi
            sleep 5
          done


      - name: Wait – discovery-service (Eureka)
        run: |
          echo "Waiting for discovery-service..."
          for i in $(seq 1 36); do
            if curl -sf http://localhost:8761/actuator/health > /dev/null 2>&1; then
              echo "discovery-service healthy after $((i*5))s"
              break
            fi
            if [ $i -eq 36 ]; then echo "discovery-service timed out"; exit 1; fi
            sleep 5
          done

      - name: Wait – auth-service
        run: |
          echo "Waiting for auth-service..."
          for i in $(seq 1 48); do
            if curl -sf http://localhost:8081/ > /dev/null 2>&1; then
              echo "auth-service healthy after $((i*5))s"
              break
            fi
            if [ $i -eq 48 ]; then echo "auth-service timed out"; exit 1; fi
            sleep 5
          done

      - name: Wait – notification-service
        run: |
          echo "Waiting for notification-service..."
          for i in $(seq 1 48); do
            if curl -sf http://localhost:8095/actuator/health > /dev/null 2>&1; then
              echo "notification-service healthy after $((i*5))s"
              break
            fi
            if [ $i -eq 48 ]; then echo "notification-service timed out"; exit 1; fi
            sleep 5
          done

      - name: Wait – catalog-service
        run: |
          echo "Waiting for catalog-service..."
          for i in $(seq 1 48); do
            if curl -sf http://localhost:8083/actuator/health > /dev/null 2>&1; then
              echo "catalog-service healthy after $((i*5))s"
              break
            fi
            if [ $i -eq 48 ]; then echo "catalog-service timed out"; exit 1; fi
            sleep 5
          done

      - name: Wait – inventory-service
        run: |
          echo "Waiting for inventory-service..."
          for i in $(seq 1 48); do
            if curl -sf http://localhost:8092/actuator/health > /dev/null 2>&1; then
              echo "inventory-service healthy after $((i*5))s"
              break
            fi
            if [ $i -eq 48 ]; then echo "inventory-service timed out"; exit 1; fi
            sleep 5
          done

      - name: Wait – cart-service
        run: |
          echo "Waiting for cart-service..."
          for i in $(seq 1 48); do
            if curl -sf http://localhost:8085/actuator/health > /dev/null 2>&1; then
              echo "cart-service healthy after $((i*5))s"
              break
            fi
            if [ $i -eq 48 ]; then echo "cart-service timed out"; exit 1; fi
            sleep 5
          done

      - name: Wait – api-gateway
        run: |
          echo "Waiting for api-gateway..."
          for i in $(seq 1 48); do
            if curl -sf http://localhost:8080/actuator/health > /dev/null 2>&1; then
              echo "api-gateway healthy after $((i*5))s"
              break
            fi
            if [ $i -eq 48 ]; then echo "api-gateway timed out"; exit 1; fi
            sleep 5
          done

      - name: Wait – nginx-proxy
        run: |
          echo "Waiting for nginx-proxy..."
          for i in $(seq 1 48); do
            if curl -k -sf https://localhost/actuator/health > /dev/null 2>&1; then
              echo "nginx-proxy healthy after $((i*5))s"
              break
            fi
            if [ $i -eq 48 ]; then echo "nginx-proxy timed out"; exit 1; fi
            sleep 5
          done

      # ──────────────────────────────────────────────────────────────
      # 7. Print container status + full health details for debugging
      # ──────────────────────────────────────────────────────────────
      - name: Show container health status
        run: docker compose -f docker-compose.yml -f docker-compose.ci.yml ps

      - name: Print actuator health details (all services)
        run: |
          echo "=== auth-service /actuator/health ==="
          curl -s http://localhost:8081/actuator/health | python3 -m json.tool || true
          echo "=== api-gateway /actuator/health ==="
          curl -s http://localhost:8080/actuator/health | python3 -m json.tool || true
          echo "=== discovery-service /actuator/health ==="
          curl -s http://localhost:8761/actuator/health | python3 -m json.tool || true
          echo "=== catalog-service /actuator/health ==="
          curl -s http://localhost:8083/actuator/health | python3 -m json.tool || true
          echo "=== inventory-service /actuator/health ==="
          curl -s http://localhost:8092/actuator/health | python3 -m json.tool || true
          echo "=== cart-service /actuator/health ==="
          curl -s http://localhost:8085/actuator/health | python3 -m json.tool || true

      # ──────────────────────────────────────────────────────────────
      # 8. Run tests
      # ──────────────────────────────────────────────────────────────
      - name: Make test scripts executable
        run: chmod +x tests/*.sh

      - name: Test – auth service (full flow with email verification)
        run: bash tests/test-auth-complete.sh

      - name: Test – API gateway routes
        run: bash tests/test-gateway-routes.sh

      - name: Test – Rate Limiting
        run: bash tests/test-rate-limiting.sh

      - name: Test – Cart Service (Production Ready)
        run: bash tests/test-cart-production.sh

      - name: Test – Catalog Service (Production Ready)
        run: bash tests/test-catalog-production.sh

      # ──────────────────────────────────────────────────────────────
      # 9. Always: collect logs on failure
      # ──────────────────────────────────────────────────────────────
      - name: Dump container logs on failure
        if: failure()
        run: |
          for svc in discovery-service auth-db redis kafka mailhog auth-service api-gateway nginx-proxy; do
            echo "==== $svc logs ===="
            docker logs $svc --tail=100 2>&1 || true
          done

      - name: Upload logs as artifact
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: container-logs-${{ github.run_id }}
          path: /tmp/container-logs/
          retention-days: 7

      # ──────────────────────────────────────────────────────────────
      # 10. Teardown
      # ──────────────────────────────────────────────────────────────
      - name: Teardown stack
        if: always()
        run: |
          docker compose \
            -f docker-compose.yml \
            -f docker-compose.ci.yml \
            down -v --remove-orphans
